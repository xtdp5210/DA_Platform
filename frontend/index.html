
  <!DOCTYPE html>

    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <!--
        Content-Security-Policy (meta fallback).
        The canonical CSP is set by the API server / reverse-proxy as an HTTP
        response header. This meta tag acts as a second layer for static-host
        deployments that cannot inject HTTP headers.
        NOTE: frame-ancestors cannot be set via meta tag; it MUST come from the
        HTTP header (already set by Django SecurityHeadersMiddleware).
      -->
      <meta http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://img.youtube.com https://lh3.googleusercontent.com; connect-src 'self' https://da-platform.onrender.com https://api.razorpay.com https://checkout.razorpay.com https://liveevents.razorpay.com; frame-src https://www.youtube.com https://api.razorpay.com https://checkout.razorpay.com https://accounts.google.com;" />
      <meta name="referrer" content="strict-origin-when-cross-origin" />
      <title>Defence Attaché Roundtable 2026 — Exhibitor Portal</title>
    </head>

      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
